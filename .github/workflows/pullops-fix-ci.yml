name: PullOps Fix CI

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: true
        type: string
      head_ref:
        description: Same-repository pull request head branch
        required: true
        type: string
      trigger_actor:
        description: GitHub actor that requested the operation
        required: true
        type: string
  check_suite:
    types:
      - completed

permissions:
  checks: read
  contents: read
  pull-requests: read

concurrency:
  group: pullops-fix-ci-${{ github.event_name == 'workflow_dispatch' && inputs.pr || github.event.check_suite.pull_requests[0].number }}
  cancel-in-progress: false

jobs:
  fix-ci:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'check_suite' &&
        github.event.check_suite.conclusion == 'failure' &&
        github.event.check_suite.pull_requests[0] != null &&
        github.event.check_suite.pull_requests[0].head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    env:
      PR: ${{ github.event_name == 'workflow_dispatch' && inputs.pr || github.event.check_suite.pull_requests[0].number }}
      HEAD_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.head_ref || github.event.check_suite.pull_requests[0].head.ref }}
      TRIGGER_ACTOR: ${{ github.event_name == 'workflow_dispatch' && inputs.trigger_actor || github.event.sender.login }}

    steps:
      - name: Verify same-repository pull request
        env:
          GH_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
        run: |
          actual_head_ref="$(
            gh pr view "$PR" \
              --repo "$GITHUB_REPOSITORY" \
              --json headRefName \
              --jq '.headRefName'
          )"
          actual_head_repository="$(
            gh pr view "$PR" \
              --repo "$GITHUB_REPOSITORY" \
              --json headRepositoryOwner,headRepository \
              --jq '.headRepositoryOwner.login + "/" + .headRepository.name'
          )"

          if [ "$actual_head_repository" != "$GITHUB_REPOSITORY" ]; then
            echo "PullOps only fixes CI on same-repository PRs."
            exit 1
          fi

          if [ "$actual_head_ref" != "$HEAD_REF" ]; then
            echo "Dispatched head_ref does not match PR head branch."
            exit 1
          fi

      - name: Check out pull request branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.HEAD_REF }}
          persist-credentials: false
          token: ${{ secrets.PULLOPS_GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare PullOps fix CI
        id: prepare
        run: |
          mkdir -p "$OUTPUT_DIR"
          node src/cli/cli.js run fix-ci \
            --phase prepare \
            --runner codex-action \
            --pr "$PR"

          if [ -f "$OUTPUT_DIR/codex_prompt.md" ]; then
            echo "run_runner=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_runner=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          # PULLOPS_GITHUB_TOKEN is the install-facing secret; expose the same
          # token under the standard names expected by gh and GitHub-aware tools.
          OUTPUT_DIR: ${{ runner.temp }}/pullops-output
          GH_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PULLOPS_GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ env.TRIGGER_ACTOR }}

      - name: Verify OpenAI API key
        if: steps.prepare.outputs.run_runner == 'true'
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY repository Actions secret is required to run openai/codex-action." >&2
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run Codex
        if: steps.prepare.outputs.run_runner == 'true'
        id: codex
        uses: openai/codex-action@v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ runner.temp }}/pullops-output/codex_prompt.md
          output-file: ${{ runner.temp }}/pullops-output/codex_output.json
          model: gpt-5.4-mini
          sandbox: workspace-write
          codex-args: '["--config","approval_policy=\"never\"","--ephemeral"]'
          allow-bots: true

      - name: Restore Node for PullOps finalize
        if: always()
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Finalize PullOps fix CI
        if: always()
        run: |
          git remote set-url origin "https://x-access-token:${PULLOPS_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          node src/cli/cli.js run fix-ci \
            --phase finalize \
            --runner codex-action \
            --runner-ran "${{ steps.prepare.outputs.run_runner == 'true' && 'true' || 'false' }}" \
            --pr "$PR"
        env:
          # PULLOPS_GITHUB_TOKEN is the install-facing secret; expose the same
          # token under the standard names expected by gh and GitHub-aware tools.
          OUTPUT_DIR: ${{ runner.temp }}/pullops-output
          GH_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PULLOPS_GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ env.TRIGGER_ACTOR }}
          PULLOPS_CODEX_ACTION_OUTCOME: ${{ steps.codex.outcome }}
