name: PullOps PR Resolve Conflicts

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: true
        type: string
      head_ref:
        description: Same-repository pull request head branch
        required: true
        type: string
      trigger_actor:
        description: GitHub actor that requested the operation
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pullops-pr-resolve-conflicts-${{ inputs.pr }}
  cancel-in-progress: false

jobs:
  pr-resolve-conflicts:
    runs-on: ubuntu-latest

    steps:
      - name: Verify same-repository pull request
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PR: ${{ inputs.pr }}
          HEAD_REF: ${{ inputs.head_ref }}
        with:
          github-token: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: Number(process.env.PR),
            });

            if (pullRequest.head.repo?.full_name !== `${owner}/${repo}`) {
              core.setFailed('PullOps only resolves conflicts on same-repository PRs.');
              return;
            }

            if (pullRequest.head.ref !== process.env.HEAD_REF) {
              core.setFailed('Dispatched head_ref does not match PR head branch.');
            }

      - name: Check out pull request branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.head_ref }}
          persist-credentials: false
          token: ${{ secrets.PULLOPS_GITHUB_TOKEN }}

      - name: Configure Git committer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare PullOps resolve conflicts
        id: prepare
        run: |
          mkdir -p "$OUTPUT_DIR"
          npm exec pullops -- run pr-resolve-conflicts \
            --phase prepare \
            --runner external \
            --pr "${{ inputs.pr }}" \
            > "$PREPARE_JSON"

          node --input-type=module -e '
            import fs from "node:fs";
            const { runnerJob } = JSON.parse(fs.readFileSync(process.env.PREPARE_JSON, "utf8"));
            if (runnerJob === undefined) {
              process.stdout.write(`result_file=${process.env.OUTPUT_DIR}/runner_result.json\nrun_runner=false\n`);
            } else {
              process.stdout.write(
                [
                  `prompt_file=${runnerJob.promptFile}`,
                  `output_file=${runnerJob.outputFile}`,
                  `result_file=${runnerJob.resultFile}`,
                  `model=${runnerJob.model}`,
                  "run_runner=true",
                ].join("\n") + "\n",
              );
            }
          ' >> "$GITHUB_OUTPUT"
        env:
          OUTPUT_DIR: ${{ runner.temp }}/pullops-output
          PREPARE_JSON: ${{ runner.temp }}/pullops-output/prepare.json
          GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PULLOPS_GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ inputs.trigger_actor }}

      - name: Verify OpenAI API key
        if: steps.prepare.outputs.run_runner == 'true'
        id: runner_key
        continue-on-error: true
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY repository Actions secret is required to run openai/codex-action." >&2
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run Codex conflict pass 1
        if: steps.prepare.outputs.run_runner == 'true' && steps.runner_key.outcome == 'success'
        id: runner_1
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.prepare.outputs.prompt_file }}
          output-file: ${{ steps.prepare.outputs.output_file }}
          model: ${{ steps.prepare.outputs.model }}
          sandbox: workspace-write
          codex-args: '["--config","approval_policy=\"never\"","--ephemeral"]'
          allow-bots: true

      - name: Restore Node after conflict pass 1
        if: always()
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Record successful runner result for conflict pass 1
        if: always() && steps.prepare.outcome == 'success' && steps.prepare.outputs.run_runner == 'true' && steps.runner_1.outcome == 'success'
        run: npm exec pullops -- runner-result --status success --file "${{ steps.prepare.outputs.result_file }}"

      - name: Record failed runner result for conflict pass 1
        if: always() && steps.prepare.outcome == 'success' && steps.prepare.outputs.run_runner == 'true' && steps.runner_1.outcome != 'success' && steps.runner_1.outcome != 'cancelled'
        run: npm exec pullops -- runner-result --status failed --file "${{ steps.prepare.outputs.result_file }}"

      - name: Record cancelled runner result for conflict pass 1
        if: always() && steps.prepare.outcome == 'success' && steps.prepare.outputs.run_runner == 'true' && steps.runner_1.outcome == 'cancelled'
        run: npm exec pullops -- runner-result --status cancelled --file "${{ steps.prepare.outputs.result_file }}"

      - name: Record skipped runner result for conflict pass 1
        if: always() && steps.prepare.outcome == 'success' && steps.prepare.outputs.run_runner != 'true'
        run: npm exec pullops -- runner-result --status skipped --file "${{ steps.prepare.outputs.result_file }}"

      - name: Complete PullOps resolve conflicts pass 1
        if: always() && steps.prepare.outcome == 'success'
        id: complete_1
        run: |
          git remote set-url origin "https://x-access-token:${PULLOPS_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          npm exec pullops -- run pr-resolve-conflicts \
            --phase complete \
            --runner external \
            --pr "${{ inputs.pr }}" \
            > "$COMPLETE_JSON"

          node --input-type=module -e '
            import fs from "node:fs";
            const { runnerJob } = JSON.parse(fs.readFileSync(process.env.COMPLETE_JSON, "utf8"));
            if (runnerJob === undefined) {
              process.stdout.write(`result_file=${process.env.OUTPUT_DIR}/runner_result.json\nrun_runner=false\n`);
            } else {
              process.stdout.write(
                [
                  `prompt_file=${runnerJob.promptFile}`,
                  `output_file=${runnerJob.outputFile}`,
                  `result_file=${runnerJob.resultFile}`,
                  `model=${runnerJob.model}`,
                  "run_runner=true",
                ].join("\n") + "\n",
              );
            }
          ' >> "$GITHUB_OUTPUT"
        env:
          OUTPUT_DIR: ${{ runner.temp }}/pullops-output
          COMPLETE_JSON: ${{ runner.temp }}/pullops-output/complete-1.json
          GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PULLOPS_GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ inputs.trigger_actor }}

      - name: Run Codex conflict pass 2
        if: steps.complete_1.outputs.run_runner == 'true' && steps.runner_key.outcome == 'success'
        id: runner_2
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.complete_1.outputs.prompt_file }}
          output-file: ${{ steps.complete_1.outputs.output_file }}
          model: ${{ steps.complete_1.outputs.model }}
          sandbox: workspace-write
          codex-args: '["--config","approval_policy=\"never\"","--ephemeral"]'
          allow-bots: true

      - name: Restore Node after conflict pass 2
        if: always() && steps.complete_1.outputs.run_runner == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Record successful runner result for conflict pass 2
        if: always() && steps.complete_1.outputs.run_runner == 'true' && steps.runner_2.outcome == 'success'
        run: npm exec pullops -- runner-result --status success --file "${{ steps.complete_1.outputs.result_file }}"

      - name: Record failed runner result for conflict pass 2
        if: always() && steps.complete_1.outputs.run_runner == 'true' && steps.runner_2.outcome != 'success' && steps.runner_2.outcome != 'cancelled'
        run: npm exec pullops -- runner-result --status failed --file "${{ steps.complete_1.outputs.result_file }}"

      - name: Record cancelled runner result for conflict pass 2
        if: always() && steps.complete_1.outputs.run_runner == 'true' && steps.runner_2.outcome == 'cancelled'
        run: npm exec pullops -- runner-result --status cancelled --file "${{ steps.complete_1.outputs.result_file }}"

      - name: Complete PullOps resolve conflicts pass 2
        if: always() && steps.complete_1.outputs.run_runner == 'true'
        id: complete_2
        run: |
          git remote set-url origin "https://x-access-token:${PULLOPS_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          npm exec pullops -- run pr-resolve-conflicts \
            --phase complete \
            --runner external \
            --pr "${{ inputs.pr }}" \
            > "$COMPLETE_JSON"

          node --input-type=module -e '
            import fs from "node:fs";
            const { runnerJob } = JSON.parse(fs.readFileSync(process.env.COMPLETE_JSON, "utf8"));
            if (runnerJob === undefined) {
              process.stdout.write(`result_file=${process.env.OUTPUT_DIR}/runner_result.json\nrun_runner=false\n`);
            } else {
              process.stdout.write(
                [
                  `prompt_file=${runnerJob.promptFile}`,
                  `output_file=${runnerJob.outputFile}`,
                  `result_file=${runnerJob.resultFile}`,
                  `model=${runnerJob.model}`,
                  "run_runner=true",
                ].join("\n") + "\n",
              );
            }
          ' >> "$GITHUB_OUTPUT"
        env:
          OUTPUT_DIR: ${{ runner.temp }}/pullops-output
          COMPLETE_JSON: ${{ runner.temp }}/pullops-output/complete-2.json
          GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PULLOPS_GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ inputs.trigger_actor }}

      - name: Run Codex conflict pass 3
        if: steps.complete_2.outputs.run_runner == 'true' && steps.runner_key.outcome == 'success'
        id: runner_3
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.complete_2.outputs.prompt_file }}
          output-file: ${{ steps.complete_2.outputs.output_file }}
          model: ${{ steps.complete_2.outputs.model }}
          sandbox: workspace-write
          codex-args: '["--config","approval_policy=\"never\"","--ephemeral"]'
          allow-bots: true

      - name: Restore Node after conflict pass 3
        if: always() && steps.complete_2.outputs.run_runner == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Record successful runner result for conflict pass 3
        if: always() && steps.complete_2.outputs.run_runner == 'true' && steps.runner_3.outcome == 'success'
        run: npm exec pullops -- runner-result --status success --file "${{ steps.complete_2.outputs.result_file }}"

      - name: Record failed runner result for conflict pass 3
        if: always() && steps.complete_2.outputs.run_runner == 'true' && steps.runner_3.outcome != 'success' && steps.runner_3.outcome != 'cancelled'
        run: npm exec pullops -- runner-result --status failed --file "${{ steps.complete_2.outputs.result_file }}"

      - name: Record cancelled runner result for conflict pass 3
        if: always() && steps.complete_2.outputs.run_runner == 'true' && steps.runner_3.outcome == 'cancelled'
        run: npm exec pullops -- runner-result --status cancelled --file "${{ steps.complete_2.outputs.result_file }}"

      - name: Complete PullOps resolve conflicts pass 3
        if: always() && steps.complete_2.outputs.run_runner == 'true'
        id: complete_3
        run: |
          git remote set-url origin "https://x-access-token:${PULLOPS_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          npm exec pullops -- run pr-resolve-conflicts \
            --phase complete \
            --runner external \
            --pr "${{ inputs.pr }}" \
            > "$COMPLETE_JSON"

          node --input-type=module -e '
            import fs from "node:fs";
            const { runnerJob } = JSON.parse(fs.readFileSync(process.env.COMPLETE_JSON, "utf8"));
            if (runnerJob === undefined) {
              process.stdout.write(`result_file=${process.env.OUTPUT_DIR}/runner_result.json\nrun_runner=false\n`);
            } else {
              process.stdout.write(
                [
                  `prompt_file=${runnerJob.promptFile}`,
                  `output_file=${runnerJob.outputFile}`,
                  `result_file=${runnerJob.resultFile}`,
                  `model=${runnerJob.model}`,
                  "run_runner=true",
                ].join("\n") + "\n",
              );
            }
          ' >> "$GITHUB_OUTPUT"
        env:
          OUTPUT_DIR: ${{ runner.temp }}/pullops-output
          COMPLETE_JSON: ${{ runner.temp }}/pullops-output/complete-3.json
          GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PULLOPS_GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ inputs.trigger_actor }}

      - name: Refuse unresolved conflict pass beyond generated limit
        if: always() && steps.complete_3.outputs.run_runner == 'true'
        run: |
          echo "PullOps returned another conflict runner job after 3 generated conflict passes." >&2
          echo "Rerun pullops setup github-actions so the workflow matches operations.prResolveConflicts.maxConflictResolutionPasses." >&2
          exit 1
