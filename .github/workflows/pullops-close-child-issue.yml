name: PullOps Close Child Issue

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: true
        type: string
      head_ref:
        description: Same-repository pull request head branch
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pullops-close-child-issue-${{ inputs.pr }}
  cancel-in-progress: false

jobs:
  close-child-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Verify same-repository pull request
        env:
          GH_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PR: ${{ inputs.pr }}
          HEAD_REF: ${{ inputs.head_ref }}
        run: |
          actual_head_ref="$(
            gh pr view "$PR" \
              --repo "$GITHUB_REPOSITORY" \
              --json headRefName \
              --jq '.headRefName'
          )"
          actual_head_repository="$(
            gh pr view "$PR" \
              --repo "$GITHUB_REPOSITORY" \
              --json headRepositoryOwner,headRepository \
              --jq '.headRepositoryOwner.login + "/" + .headRepository.name'
          )"

          if [ "$actual_head_repository" != "$GITHUB_REPOSITORY" ]; then
            echo "PullOps only closes child issues for same-repository PRs."
            exit 1
          fi

          if [ "$actual_head_ref" != "$HEAD_REF" ]; then
            echo "Dispatched head_ref does not match PR head branch."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.PULLOPS_GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PullOps close child issue
        run: node src/cli/cli.js run close-child-issue --pr "${{ inputs.pr }}"
        env:
          # PULLOPS_GITHUB_TOKEN is the install-facing secret; expose the same
          # token under the standard names expected by gh and GitHub-aware tools.
          OUTPUT_DIR: ${{ runner.temp }}/pullops-output
          GH_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PULLOPS_GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
