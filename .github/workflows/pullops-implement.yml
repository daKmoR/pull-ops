name: PullOps Implement

on:
  workflow_dispatch:
    inputs:
      issue:
        description: Issue number
        required: true
        type: string
      trigger_actor:
        description: GitHub actor that requested the operation
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pullops-implement-${{ inputs.issue }}
  cancel-in-progress: false

jobs:
  implement:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PULLOPS_GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PullOps implement issue
        run: npm run pullops:implement-issue -- --issue ${{ inputs.issue }}
        env:
          # PULLOPS_GITHUB_TOKEN is the install-facing secret; expose the same
          # token under the standard names expected by gh and GitHub-aware tools.
          GH_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PULLOPS_GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ inputs.trigger_actor }}
          OUTPUT_DIR: ${{ runner.temp }}/pullops-output
