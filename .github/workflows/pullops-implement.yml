name: PullOps Implement

on:
  workflow_dispatch:
    inputs:
      issue:
        description: Issue number
        required: true
        type: string
      trigger_actor:
        description: GitHub actor that requested the operation
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pullops-implement-${{ inputs.issue }}
  cancel-in-progress: false

jobs:
  implement:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.PULLOPS_GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare PullOps implement issue
        id: prepare
        run: |
          mkdir -p "$OUTPUT_DIR"
          node src/cli/cli.js run implement-issue \
            --phase prepare \
            --runner codex-action \
            --issue "${{ inputs.issue }}"

          if [ -f "$OUTPUT_DIR/codex_prompt.md" ]; then
            echo "run_runner=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_runner=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          # PULLOPS_GITHUB_TOKEN is the install-facing secret; expose it under
          # the standard token name used by GitHub-aware tools.
          OUTPUT_DIR: ${{ runner.temp }}/pullops-output
          GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PULLOPS_GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ inputs.trigger_actor }}

      - name: Verify OpenAI API key
        if: steps.prepare.outputs.run_runner == 'true'
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY repository Actions secret is required to run openai/codex-action." >&2
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run Codex
        if: steps.prepare.outputs.run_runner == 'true'
        id: codex
        uses: openai/codex-action@v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ runner.temp }}/pullops-output/codex_prompt.md
          output-file: ${{ runner.temp }}/pullops-output/codex_output.json
          model: gpt-5.5
          sandbox: workspace-write
          codex-args: '["--config","approval_policy=\"never\"","--ephemeral"]'
          allow-bots: true

      - name: Restore Node for PullOps finalize
        if: always()
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Finalize PullOps implement issue
        if: always()
        run: |
          git remote set-url origin "https://x-access-token:${PULLOPS_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          node src/cli/cli.js run implement-issue \
            --phase finalize \
            --runner codex-action \
            --runner-ran "${{ steps.prepare.outputs.run_runner == 'true' && 'true' || 'false' }}" \
            --issue "${{ inputs.issue }}"
        env:
          # PULLOPS_GITHUB_TOKEN is the install-facing secret; expose it under
          # the standard token name used by GitHub-aware tools.
          OUTPUT_DIR: ${{ runner.temp }}/pullops-output
          GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PULLOPS_GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ inputs.trigger_actor }}
          PULLOPS_CODEX_ACTION_OUTCOME: ${{ steps.codex.outcome }}
