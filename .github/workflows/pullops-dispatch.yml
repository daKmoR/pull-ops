name: PullOps Dispatch

on:
  issues:
    types:
      - labeled
  pull_request_target:
    types:
      - labeled

permissions:
  actions: write
  issues: read
  pull-requests: read

jobs:
  dispatch-issue:
    if: >-
      github.event_name == 'issues' &&
      (
        github.event.label.name == 'pullops:prd:prepare' ||
        github.event.label.name == 'pullops:prd:coordinate' ||
        github.event.label.name == 'pullops:issue:implement'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Verify trigger actor can run Codex
        env:
          GH_TOKEN: ${{ github.token }}
          TRIGGER_ACTOR: ${{ github.actor }}
        run: |
          permission="$(
            gh api \
              "repos/$GITHUB_REPOSITORY/collaborators/$TRIGGER_ACTOR/permission" \
              --jq '.permission'
          )"

          case "$permission" in
            admin|maintain|write)
              ;;
            *)
              echo "Actor '$TRIGGER_ACTOR' must have write access to run PullOps Codex workflows. Detected permission: '$permission'." >&2
              exit 1
              ;;
          esac

      - name: Dispatch issue operation workflow
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ github.event.label.name }}
          ISSUE: ${{ github.event.issue.number }}
          TRIGGER_ACTOR: ${{ github.actor }}
        run: |
          case "$LABEL" in
            pullops:prd:prepare)
              workflow="pullops-prepare.yml"
              ;;
            pullops:prd:coordinate)
              workflow="pullops-coordinate.yml"
              ;;
            pullops:issue:implement)
              workflow="pullops-implement.yml"
              ;;
          esac

          gh workflow run "$workflow" \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$GITHUB_REF_NAME" \
            -f issue="$ISSUE" \
            -f trigger_actor="$TRIGGER_ACTOR"

  dispatch-pull-request:
    if: >-
      github.event_name == 'pull_request_target' &&
      (
        github.event.label.name == 'pullops:pr:review' ||
        github.event.label.name == 'pullops:pr:address-review' ||
        github.event.label.name == 'pullops:pr:fix-ci' ||
        github.event.label.name == 'pullops:pr:prepare-merge'
      ) &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Verify trigger actor can run Codex
        env:
          GH_TOKEN: ${{ github.token }}
          TRIGGER_ACTOR: ${{ github.actor }}
        run: |
          permission="$(
            gh api \
              "repos/$GITHUB_REPOSITORY/collaborators/$TRIGGER_ACTOR/permission" \
              --jq '.permission'
          )"

          case "$permission" in
            admin|maintain|write)
              ;;
            *)
              echo "Actor '$TRIGGER_ACTOR' must have write access to run PullOps Codex workflows. Detected permission: '$permission'." >&2
              exit 1
              ;;
          esac

      - name: Dispatch pull request operation workflow
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ github.event.label.name }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          TRIGGER_ACTOR: ${{ github.actor }}
        run: |
          case "$LABEL" in
            pullops:pr:review)
              workflow="pullops-review.yml"
              ;;
            pullops:pr:address-review)
              workflow="pullops-address-review.yml"
              ;;
            pullops:pr:fix-ci)
              workflow="pullops-fix-ci.yml"
              ;;
            pullops:pr:prepare-merge)
              workflow="pullops-prepare-merge.yml"
              ;;
          esac

          gh workflow run "$workflow" \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$GITHUB_REF_NAME" \
            -f pr="$PR" \
            -f head_ref="$HEAD_REF" \
            -f trigger_actor="$TRIGGER_ACTOR"
