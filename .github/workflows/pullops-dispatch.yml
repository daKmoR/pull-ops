name: PullOps Dispatch

on:
  issues:
    types:
      - labeled
  pull_request_target:
    types:
      - labeled

permissions:
  actions: write
  issues: read
  pull-requests: read

jobs:
  dispatch-issue:
    if: >-
      github.event_name == 'issues' &&
      (
        github.event.label.name == 'pullops:prd:prepare' ||
        github.event.label.name == 'pullops:prd:auto-advance' ||
        github.event.label.name == 'pullops:prd:auto-complete' ||
        github.event.label.name == 'pullops:issue:implement'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Verify trigger actor can run PullOps operations
        uses: actions/github-script@v8
        env:
          TRIGGER_ACTOR: ${{ github.actor }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: process.env.TRIGGER_ACTOR,
            });

            if (!['admin', 'maintain', 'write'].includes(data.permission)) {
              core.setFailed(
                `Actor '${process.env.TRIGGER_ACTOR}' must have write access to run PullOps workflows. Detected permission: '${data.permission}'.`,
              );
            }

      - name: Dispatch issue operation workflow
        uses: actions/github-script@v8
        env:
          LABEL: ${{ github.event.label.name }}
          ISSUE: ${{ github.event.issue.number }}
          TRIGGER_ACTOR: ${{ github.actor }}
        with:
          github-token: ${{ github.token }}
          script: |
            const workflows = {
              'pullops:prd:prepare': 'pullops-prd-prepare.yml',
              'pullops:prd:auto-advance': 'pullops-prd-auto-advance.yml',
              'pullops:prd:auto-complete': 'pullops-prd-auto-complete.yml',
              'pullops:issue:implement': 'pullops-issue-implement.yml',
            };
            const workflow_id = workflows[process.env.LABEL];
            if (workflow_id === undefined) {
              core.setFailed(`Unsupported PullOps label '${process.env.LABEL}'.`);
              return;
            }

            const { owner, repo } = context.repo;
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref: process.env.GITHUB_REF_NAME,
              inputs: {
                issue: process.env.ISSUE,
                trigger_actor: process.env.TRIGGER_ACTOR,
              },
            });

  dispatch-pull-request:
    if: >-
      github.event_name == 'pull_request_target' &&
      (
        github.event.label.name == 'pullops:pr:review' ||
        github.event.label.name == 'pullops:pr:address-review' ||
        github.event.label.name == 'pullops:pr:fix-ci' ||
        github.event.label.name == 'pullops:pr:update-branch' ||
        github.event.label.name == 'pullops:pr:resolve-conflicts' ||
        github.event.label.name == 'pullops:pr:finalize'
      ) &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Verify trigger actor can run PullOps operations
        uses: actions/github-script@v8
        env:
          TRIGGER_ACTOR: ${{ github.actor }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: process.env.TRIGGER_ACTOR,
            });

            if (!['admin', 'maintain', 'write'].includes(data.permission)) {
              core.setFailed(
                `Actor '${process.env.TRIGGER_ACTOR}' must have write access to run PullOps workflows. Detected permission: '${data.permission}'.`,
              );
            }

      - name: Dispatch pull request operation workflow
        uses: actions/github-script@v8
        env:
          LABEL: ${{ github.event.label.name }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          TRIGGER_ACTOR: ${{ github.actor }}
        with:
          github-token: ${{ github.token }}
          script: |
            const workflows = {
              'pullops:pr:review': 'pullops-pr-review.yml',
              'pullops:pr:address-review': 'pullops-pr-address-review.yml',
              'pullops:pr:fix-ci': 'pullops-pr-fix-ci.yml',
              'pullops:pr:update-branch': 'pullops-pr-update-branch.yml',
              'pullops:pr:resolve-conflicts': 'pullops-pr-resolve-conflicts.yml',
              'pullops:pr:finalize': 'pullops-pr-finalize.yml',
            };
            const workflow_id = workflows[process.env.LABEL];
            if (workflow_id === undefined) {
              core.setFailed(`Unsupported PullOps label '${process.env.LABEL}'.`);
              return;
            }

            const { owner, repo } = context.repo;
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref: process.env.GITHUB_REF_NAME,
              inputs: {
                pr: process.env.PR,
                head_ref: process.env.HEAD_REF,
                trigger_actor: process.env.TRIGGER_ACTOR,
              },
            });
