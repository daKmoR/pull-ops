name: PullOps PRD Coordinate

on:
  workflow_dispatch:
    inputs:
      issue:
        description: Issue number
        required: true
        type: string
      trigger_actor:
        description: GitHub actor that requested the operation
        required: true
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: pullops-prd-coordinate-${{ inputs.issue }}
  cancel-in-progress: false

jobs:
  prd-coordinate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PULLOPS_GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PullOps coordinate PRD
        run: npm run pullops:prd-coordinate -- --issue ${{ inputs.issue }}
        env:
          # PULLOPS_GITHUB_TOKEN is the install-facing secret; expose it under
          # the standard token name used by GitHub-aware tools.
          OUTPUT_DIR: ${{ runner.temp }}/pullops-output
          GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          PULLOPS_GITHUB_TOKEN: ${{ secrets.PULLOPS_GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ inputs.trigger_actor }}
